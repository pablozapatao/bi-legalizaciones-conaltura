name: ETL Legalizaciones Conaltura

on:
  # ── Disparo manual ───────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      modo:
        description: 'Modo de ejecución'
        required: true
        default: 'muestra'
        type: choice
        options:
          - muestra      # 5 registros + verificación HubSpot (sin BD)
          - verify       # Solo verifica propiedades HubSpot (sin BD)
          - transform    # Extrae todo + transforma + diagnóstico (sin BD)
          - completo     # ETL completo → Neon (producción)

  # ── Cron cada 2 horas ────────────────────────────────────────────────────
  schedule:
    - cron: '0 */2 * * *'

jobs:
  etl:
    name: >-
      ${{ github.event_name == 'workflow_dispatch'
          && format('ETL [{0}] — manual', inputs.modo)
          || 'ETL [completo] — automático' }}
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. Python 3.11
      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Dependencias
      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Contexto
      - name: 📋 Contexto de la corrida
        run: |
          echo "=================================================="
          echo "🏢 CONALTURA — ETL LEGALIZACIONES v3.0"
          echo "Modo      : ${{ github.event.inputs.modo || 'completo' }}"
          echo "Trigger   : ${{ github.event_name }}"
          echo "Fecha UTC : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Fecha COL : $(TZ='America/Bogota' date '+%Y-%m-%d %H:%M:%S')"
          echo "=================================================="

      # 5a. MUESTRA
      - name: 🔍 ETL — Modo Muestra
        if: github.event.inputs.modo == 'muestra'
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: python etl_legalizaciones.py --muestra

      # 5b. VERIFY
      - name: 🔍 ETL — Solo verificación de propiedades
        if: github.event.inputs.modo == 'verify'
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: python etl_legalizaciones.py --verify

      # 5c. TRANSFORM
      - name: 🔄 ETL — Transformación completa (sin carga)
        if: github.event.inputs.modo == 'transform'
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: python etl_legalizaciones.py --transform

      # 5d. COMPLETO — manual o automático
      - name: 🚀 ETL — Completo (extracción + transformación + carga a Neon)
        if: >-
          github.event_name == 'schedule' ||
          github.event.inputs.modo == 'completo'
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
        run: python etl_legalizaciones.py

      # 6. Resumen
      - name: ✅ Resumen
        if: always()
        run: |
          echo "=================================================="
          echo "Corrida finalizada | Resultado: ${{ job.status }}"
          echo "=================================================="
